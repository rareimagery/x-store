version: '3.8'

services:
  drupal:
    image: drupal:11-apache
    container_name: xstore-drupal
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html
      - .docker/apache/000-default.conf:/etc/apache2/sites-available/000-default.conf
      - files:/var/www/html/web/sites/default/files
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: xstore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: drupal
      POSTGRES_USER: drupal
      POSTGRES_PASSWORD: drupalpassword
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
  files:
